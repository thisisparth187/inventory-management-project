<!DOCTYPE html>
<html>

<head>
    <title>Smart Inventory Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            min-height: 100vh;
        }

        #app {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 16px;
        }

        h1 {
            text-align: center;
            margin-top: 20px;
            font-size: clamp(1.4rem, 5vw, 2rem);
            margin-bottom: 8px;
        }

        .live {
            color: #22c55e;
            animation: blink 1s infinite;
            font-size: clamp(0.85rem, 3vw, 1rem);
            margin: 4px 0 0 0;
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: clamp(12px, 3vw, 25px);
            width: 100%;
            max-width: 520px;
            margin-top: 24px;
        }

        .card {
            padding: clamp(14px, 4vw, 20px) clamp(10px, 3vw, 20px);
            border-radius: 15px;
            background: #1e293b;
            transition: 0.3s;
            font-size: clamp(0.9rem, 3.5vw, 1rem);
            font-weight: bold;
            min-width: 0;
        }

        .closed {
            background: rgba(255, 30, 30, 0.15);
            animation: glowRed 1.2s infinite alternate;
            border: 2px solid red;
            box-shadow: 0 0 15px red;
        }

        .open {
            background: rgba(34, 197, 94, 0.12);
            animation: glowGreen 1.5s infinite alternate;
            border: 2px solid #22c55e;
            box-shadow: 0 0 15px #22c55e;
        }

        .status {
            height: 1px;
            width: 100%;
            border-radius: 5px;
            margin-top: 10px;
            font-size: clamp(0.75rem, 2.5vw, 1rem);
            margin-top: 10px;
        }

        .log {
            margin-top: 24px;
            width: 100%;
            max-width: 340px;
            margin-left: auto;
            margin-right: auto;
            text-align: center;
            font-size: clamp(0.75rem, 3vw, 0.9rem);
            background: #1e293b;
            padding: 12px 16px;
            border-radius: 10px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        footer {
            margin-top: auto;
            padding: clamp(10px, 3vw, 15px);
            background: #1e293b;
            border-top: 1px solid #334155;
            font-size: clamp(0.75rem, 3vw, 0.875rem);
            color: #94a3b8;
            line-height: 1.6;
        }

        footer strong {
            color: #22c55e;
        }

        footer p {
            margin: 2px 0;
        }

        /* ── Splash ── */
        #splash {
            position: fixed;
            inset: 0;
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 20px;
        }

        #splash h1 {
            font-size: clamp(1.4rem, 6vw, 2rem);
        }

        #splash p {
            font-size: clamp(0.8rem, 3.5vw, 1rem);
            margin: 4px 0;
        }

        /* Loader */
        .loader {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: inline-block;
            position: relative;
            border-top: 4px solid #FFF;
            border-right: 4px solid transparent;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
            margin: 20px 0;
        }

        .loader::after {
            content: '';
            box-sizing: border-box;
            position: absolute;
            left: 0;
            top: 0;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border-bottom: 4px solid #22c55e;
            border-left: 4px solid transparent;
        }

        @keyframes rotation {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes glowGreen {
            from { box-shadow: 0 0 5px #22c55e, 0 0 10px #22c55e; opacity: 0.6; }
            to   { box-shadow: 0 0 15px #22c55e, 0 0 30px #22c55e; opacity: 1; }
        }

        @keyframes glowRed {
            from { box-shadow: 0 0 5px red, 0 0 10px red; opacity: 0.5; }
            to   { box-shadow: 0 0 15px red, 0 0 30px red; opacity: 1; }
        }

        /* ── Responsive breakpoints ── */

        /* Small phones (< 360px): 2-column grid */
        @media (max-width: 359px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Landscape phones */
        @media (max-height: 500px) and (orientation: landscape) {
            .main {
                padding: 10px 16px;
            }
            h1 {
                margin-top: 8px;
                font-size: 1.2rem;
            }
            .grid {
                margin-top: 12px;
                gap: 10px;
            }
            .log {
                margin-top: 12px;
            }
        }

        /* Tablets and up: restore fixed card sizing */
        @media (min-width: 600px) {
            .grid {
                grid-template-columns: repeat(3, 150px);
            }
        }
    </style>
</head>

<body>
    <div id="splash">
        <h1>📦 Smart Inventory</h1>
        <div class="loader"></div>
        
    </div>

    <div id="app" style="display:none;">
        <div class="main">
            <div style="font-size: 50px; margin-bottom: 15px;">📦</div>
            <div style="font-size: 25px;">Smart Inventory</div>
            <p class="live">● LIVE</p>

            <div class="grid">
                <div id="A1" class="card">A1<div class="status closed"></div></div>
                <div id="A2" class="card">A2<div class="status open"></div></div>
                <div id="A3" class="card">A3<div class="status open"></div></div>
                <div id="A4" class="card">A4<div class="status closed"></div></div>
                <div id="A5" class="card">A5<div class="status open"></div></div>
                <div id="A6" class="card">A6<div class="status closed"></div></div>
            </div>

            <div class="log" id="log">
                <p>Connecting to system...</p>
            </div>
        </div>

        <footer>
            <p><strong>Made by —</strong></p>
            <p>Parth Mangire | Shravani Naik | Riya Chinchankar</p>
        </footer>
    </div>

    <script>
        const ESP_IP = "https://nanometer-fleshed-sesame.ngrok-free.dev/data";

        window.onload = function () {
            setTimeout(() => {
                document.getElementById("splash").style.display = "none";
                document.getElementById("app").style.display = "flex";
                startFetching();
            }, 2500);
        };

        function updateUI(data) {
            const map = [
                { id: "A1", val: data.slot1 },
                { id: "A2", val: data.slot2 },
                { id: "A3", val: data.slot3 },
                { id: "A4", val: data.slot4 },
                { id: "A5", val: data.slot5 },
                { id: "A6", val: data.slot6 }
            ];

            map.forEach(slot => {
                let card = document.getElementById(slot.id);
                let status = card.querySelector(".status");
                if (slot.val === 1) {
                    status.classList.remove("closed");
                    status.classList.add("open");
                } else {
                    status.classList.remove("open");
                    status.classList.add("closed");
                }
            });

            document.getElementById("log").innerHTML = "Last updated: " + new Date().toLocaleTimeString();
        }

        function fetchData() {
            fetch(ESP_IP, {
                headers: { "ngrok-skip-browser-warning": "true" }
            })
            .then(res => res.json())
            .then(data => updateUI(data))
            .catch(err => {
                console.error(err);
                document.getElementById("log").innerHTML = "Connection error ⚠️";
            });
        }

        function startFetching() {
            fetchData();
            setInterval(fetchData, 500);
        }
    </script>
</body>
</html>
